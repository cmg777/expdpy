project:
  type: website
  output-dir: _site
  resources:
    - data/kuznets.csv

website:
  title: "expdpy"
  description: "Explore your panel data interactively — a Python port of ExPanDaR."
  favicon: images/favicon.png
  repo-url: https://github.com/cmg777/expdpy
  repo-actions: [issue, edit]
  navbar:
    background: primary
    logo: images/logo-navbar.svg
    logo-alt: "expdpy logo"
    left:
      - text: "Home"
        file: index.qmd
      - text: "Explore"
        file: explore.qmd
      - text: "Analyze"
        file: analyze.qmd
      - text: "Learn"
        file: learn.qmd
      - text: "App"
        file: streamlit.qmd
      - text: "Articles"
        menu:
          - text: "The kuznets dataset"
            file: explanation/kuznets-dataset.qmd
          - text: "Data model"
            file: explanation/data-model.qmd
          - text: "Parity with ExPanDaR"
            file: explanation/parity.qmd
      - text: "Reference"
        file: reference/index.qmd
      - text: "Changelog"
        file: changelog.qmd
    right:
      - icon: github
        href: https://github.com/cmg777/expdpy
  sidebar:
    style: docked
    contents:
      - reference/_sidebar.yml

format:
  html:
    theme: cosmo
    toc: true
    code-copy: true
    code-overflow: wrap

metadata-files:
  - reference/_sidebar.yml

quartodoc:
  package: expdpy
  parser: numpy
  title: API Reference
  sidebar: reference/_sidebar.yml
  dir: reference
  render_interlinks: true
  sections:
    - title: Explore
      desc: >-
        Exploratory analysis — descriptive / correlation / extreme-observation tables,
        distributions, time trends, group comparisons, missing-value maps, scatter plots and
        outlier treatment.
      contents:
        - prepare_descriptive_table
        - prepare_correlation_table
        - prepare_ext_obs_table
        - prepare_histogram
        - prepare_bar_chart
        - prepare_correlation_graph
        - prepare_trend_graph
        - prepare_quantile_trend_graph
        - prepare_by_group_bar_graph
        - prepare_by_group_trend_graph
        - prepare_by_group_violin_graph
        - prepare_missing_values_graph
        - prepare_scatter_plot
        - treat_outliers
    - title: Analyze
      desc: >-
        Panel estimators — OLS with fixed effects and clustered SEs, stepwise / Newey–West /
        Driscoll–Kraay estimation, the Frisch–Waugh–Lovell and coefficient plots, pooled /
        between / fixed / random effects, correlated random effects (Mundlak), the Hausman
        test, post-estimation, robust inference and event-study / difference-in-differences.
      contents:
        - prepare_regression_table
        - prepare_estimation
        - prepare_fwl_plot
        - prepare_coefficient_plot
        - prepare_panel_table
        - prepare_cre_table
        - prepare_hausman_test
        - prepare_fixef_plot
        - prepare_predictions
        - prepare_joint_test
        - prepare_robust_inference
        - prepare_event_study
        - prepare_panel_view
    - title: Learn
      desc: >-
        The teaching layer — concept sandboxes (simulated demonstrations) and concept
        explainers. Plain-language interpretation lives on the result objects via
        ``.interpret()``.
      contents:
        - sandbox_omitted_variable_bias
        - sandbox_pooled_vs_fixed_effects
        - sandbox_clustering_se
        - sandbox_first_differences
        - sandbox_within_vs_lsdv
        - explain
        - list_topics
    - title: Interactive apps
      desc: The three no-code ExPdPy apps (Streamlit) — one per module.
      package: expdpy.streamlit_app
      contents:
        - ExploreApp
        - AnalyzeApp
        - LearnApp
    - title: Datasets
      package: expdpy.data
      contents:
        - load_kuznets
        - load_kuznets_data_def
        - load_gapminder
        - load_staggered_did
        - get_config
