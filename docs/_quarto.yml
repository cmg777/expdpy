project:
  type: website
  output-dir: _site
  resources:
    - data/kuznets.csv

website:
  title: "expdpy"
  description: "Explore your panel data interactively — a Python port of ExPanDaR."
  favicon: images/favicon.png
  repo-url: https://github.com/cmg777/expdpy
  repo-actions: [issue, edit]
  navbar:
    background: primary
    logo: images/logo-navbar.svg
    logo-alt: "expdpy logo"
    left:
      - text: "Home"
        file: index.qmd
      - text: "Quickstart"
        file: quickstart.qmd
      - text: "App"
        file: streamlit.qmd
      - text: "Articles"
        menu:
          - text: "The kuznets dataset"
            file: explanation/kuznets-dataset.qmd
          - text: "Data model"
            file: explanation/data-model.qmd
          - text: "Parity with ExPanDaR"
            file: explanation/parity.qmd
      - text: "API Reference"
        menu:
          - text: "Function reference"
            file: reference/index.qmd
          - text: "Examples gallery"
            file: examples.qmd
      - text: "Changelog"
        file: changelog.qmd
    right:
      - icon: github
        href: https://github.com/cmg777/expdpy
  sidebar:
    style: docked
    contents:
      - reference/_sidebar.yml

format:
  html:
    theme: cosmo
    toc: true
    code-copy: true
    code-overflow: wrap

metadata-files:
  - reference/_sidebar.yml

quartodoc:
  package: expdpy
  parser: numpy
  title: API Reference
  sidebar: reference/_sidebar.yml
  dir: reference
  render_interlinks: true
  sections:
    - title: Tables
      desc: Descriptive, correlation and extreme-observation tables.
      contents:
        - prepare_descriptive_table
        - prepare_correlation_table
        - prepare_ext_obs_table
    - title: Graphs
      desc: Interactive Plotly figures.
      contents:
        - prepare_correlation_graph
        - prepare_trend_graph
        - prepare_quantile_trend_graph
        - prepare_by_group_bar_graph
        - prepare_by_group_trend_graph
        - prepare_by_group_violin_graph
        - prepare_histogram
        - prepare_bar_chart
        - prepare_missing_values_graph
        - prepare_scatter_plot
    - title: Regression
      desc: OLS with fixed effects and clustered standard errors (pyfixest).
      contents:
        - prepare_regression_table
        - prepare_fwl_plot
    - title: Estimation
      desc: >-
        A unified estimator (IV/2SLS, Poisson, logit/probit), richer standard errors and
        model comparison, plus coefficient plots.
      contents:
        - prepare_estimation
        - prepare_coefficient_plot
    - title: Post-estimation
      desc: Operate on a fitted model — visualize fixed effects, predict, and joint-test.
      contents:
        - prepare_fixef_plot
        - prepare_predictions
        - prepare_joint_test
    - title: Robust inference
      desc: Randomization inference and the wild cluster bootstrap.
      contents:
        - prepare_robust_inference
    - title: Event study & difference-in-differences
      desc: Staggered DiD / event studies and panel-structure visualization.
      contents:
        - prepare_event_study
        - prepare_panel_view
    - title: Panel models
      desc: >-
        Pooled / between / fixed / random effects and the Hausman test (requires the
        optional ``panel`` extra, via linearmodels).
      contents:
        - prepare_panel_table
        - prepare_hausman_test
    - title: Concept sandboxes
      desc: Simulated teaching demonstrations.
      contents:
        - sandbox_omitted_variable_bias
        - sandbox_pooled_vs_fixed_effects
        - sandbox_clustering_se
    - title: Pedagogy
      desc: Concept explainers (plain-language interpretation lives on the result objects).
      contents:
        - explain
        - list_topics
    - title: Data preparation
      contents:
        - treat_outliers
    - title: Interactive app
      desc: The no-code ExPdPy exploration app (Streamlit).
      contents:
        - streamlit_app.ExPdPy
    - title: Datasets
      package: expdpy.data
      contents:
        - load_kuznets
        - load_kuznets_data_def
        - load_gapminder
        - load_staggered_did
        - get_config
