project:
  type: website
  output-dir: _site
  resources:
    - data/kuznets.csv

website:
  title: "expdpy"
  description: "Explore your panel data interactively — a Python port of ExPanDaR."
  favicon: images/favicon.png
  repo-url: https://github.com/cmg777/expdpy
  repo-actions: [issue, edit]
  navbar:
    background: primary
    logo: images/logo-navbar.svg
    logo-alt: "expdpy logo"
    left:
      - text: "Home"
        file: index.qmd
      - text: "Explore"
        file: explore.qmd
      - text: "Analyze"
        file: analyze.qmd
      - text: "Learn"
        file: learn.qmd
      - text: "App"
        file: streamlit.qmd
      - text: "Articles"
        menu:
          - text: "Beta convergence (analyze_beta_convergence)"
            file: analyze_beta_convergence.qmd
          - text: "Sigma convergence (analyze_sigma_convergence)"
            file: analyze_sigma_convergence.qmd
          - text: "Convergence clubs (analyze_convergence_clubs)"
            file: analyze_convergence_clubs.qmd
          - text: "The kuznets dataset"
            file: explanation/kuznets-dataset.qmd
          - text: "Data model"
            file: explanation/data-model.qmd
      - text: "Reference"
        file: reference/index.qmd
      - text: "Changelog"
        file: changelog.qmd
    right:
      - icon: github
        href: https://github.com/cmg777/expdpy
  sidebar:
    style: docked
    contents:
      - reference/_sidebar.yml

format:
  html:
    theme: cosmo
    toc: true
    code-copy: true
    code-overflow: wrap

metadata-files:
  - reference/_sidebar.yml

quartodoc:
  package: expdpy
  parser: numpy
  title: API Reference
  sidebar: reference/_sidebar.yml
  dir: reference
  render_interlinks: true
  sections:
    - title: Explore
      desc: >-
        Exploratory analysis — descriptive / correlation / extreme-observation tables,
        distributions, time trends, group comparisons, missing-value maps, scatter plots,
        within/between variation, per-unit trajectories, panel-structure diagnostics,
        and distribution & transition dynamics.
      contents:
        - explore_descriptive_table
        - explore_correlation_table
        - explore_ext_obs_table
        - explore_histogram
        - explore_bar_plot
        - explore_correlation_plot
        - explore_trend_plot
        - explore_quantile_trend_plot
        - explore_bar_plot_by_group
        - explore_trend_plot_by_group
        - explore_violin_plot_by_group
        - explore_missing_values_plot
        - explore_scatter_plot
        - explore_xtsum_table
        - explore_scatter_plot_within_between
        - explore_spaghetti_plot
        - explore_panel_structure
        - explore_value_heatmap
        - explore_distribution_over_time
        - explore_transition_matrix
        - explore_within_persistence
    - title: Analyze
      desc: >-
        Panel estimators — OLS with fixed effects and clustered SEs, stepwise / Newey–West /
        Driscoll–Kraay estimation, the Frisch–Waugh–Lovell and coefficient plots, pooled /
        between / fixed / random effects, correlated random effects (Mundlak), the Hausman
        test, post-estimation, robust inference, event-study / difference-in-differences,
        β-convergence (unconditional / conditional with speed, half-life and a rolling view),
        σ-convergence (the trend in cross-sectional dispersion over time), and club convergence
        (the Phillips–Sul log(t) test with data-driven clustering).
      contents:
        - analyze_regression_table
        - analyze_estimation
        - analyze_fwl_plot
        - analyze_coefficient_plot
        - analyze_panel_table
        - analyze_cre_table
        - analyze_hausman_test
        - analyze_fixef_plot
        - analyze_predictions
        - analyze_joint_test
        - analyze_robust_inference
        - analyze_event_study
        - analyze_panel_view
        - analyze_beta_convergence
        - analyze_sigma_convergence
        - analyze_convergence_clubs
    - title: Learn
      desc: >-
        The teaching layer — concept sandboxes (simulated demonstrations) and concept
        explainers. Plain-language interpretation lives on the result objects via
        ``.interpret()``.
      contents:
        - learn_omitted_variable_bias
        - learn_pooled_vs_fixed_effects
        - learn_clustering_se
        - learn_first_differences
        - learn_within_vs_lsdv
        - learn_beta_convergence
        - learn_sigma_convergence
        - learn_convergence_clubs
    - title: Utilities
      desc: >-
        Cross-cutting helpers shared across modules — panel declaration, outlier
        treatment, and the concept-explainer registry.
      contents:
        - set_panel
        - resolve_panel
        - treat_outliers
        - explain
        - list_topics
    - title: Interactive apps
      desc: The three no-code ExPdPy apps (Streamlit) — one per module.
      package: expdpy.streamlit_app
      contents:
        - ExploreApp
        - AnalyzeApp
        - LearnApp
    - title: Datasets
      package: expdpy.data
      contents:
        - load_kuznets
        - load_kuznets_data_def
        - load_gapminder
        - load_staggered_did
        - load_productivity
        - load_productivity_data_def
        - get_config
