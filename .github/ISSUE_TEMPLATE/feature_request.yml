name: Feature request
description: Suggest an idea or enhancement for expdpy
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do that expdpy does not yet support?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the API or behavior you would like to see.
  - type: textarea
    id: expandar
    attributes:
      label: ExPanDaR reference
      description: If this mirrors an ExPanDaR (R) feature, link or name the relevant function.
