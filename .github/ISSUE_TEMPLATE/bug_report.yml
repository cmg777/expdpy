name: Bug report
description: Report a problem with expdpy
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including the full traceback if any.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproducible example
      description: A small, self-contained code snippet that reproduces the issue.
      render: python
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: expdpy version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.12"
    validations:
      required: true
