name: Docs

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          environments: docs
      - name: Build site (quartodoc + quarto)
        run: pixi run -e docs docs-build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site

  notebooks-fresh:
    name: Notebooks in sync with docs sources
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          # docs provides quarto (the notebook build); lint provides ruff, which
          # formats the notebook code cells exactly as the pre-commit hook does.
          environments: |
            docs
            lint
      - name: Rebuild Colab notebooks from the .qmd sources
        run: pixi run -e docs python tools/build_quickstart_notebook.py
      - name: Canonicalize cell formatting (matches the pre-commit ruff hook)
        run: pixi run -e lint ruff format notebooks/
      - name: Fail if committed notebooks drift from their sources
        # The title cell's build timestamp changes every run, so ignore that one line
        # (it forms its own single-line hunk); any other diff means the .qmd changed
        # without the notebooks being regenerated and committed.
        run: |
          git diff --exit-code \
            -I '_Notebook version: built [0-9]{4}-[0-9]{2}-[0-9]{2} [0-9]{2}:[0-9]{2} UTC' \
            -- notebooks/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
