coverage:
  status:
    project:
      default:
        target: auto
        threshold: 2%
    patch:
      default:
        target: auto
        threshold: 5%

comment:
  layout: "reach, diff, flags, files"
  behavior: default

ignore:
  - "src/expdpy/app/**"
  - "tools/**"
  - "tests/**"

flags:
  core:
    paths:
      - src/expdpy/
